version: '3.8'

services:
  intranet_frontend:
    image: nginx:alpine
    container_name: intranet_frontend
    restart: unless-stopped
    volumes:
      - ./:/usr/share/nginx/html
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - red_pro

networks:
  red_pro:
    external: true