<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso Usuarios | Russell Bedford</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { 
            theme: { 
                extend: { 
                    colors: { 
                        corporate: { blue: '#001871', bg: '#F8F9FA' } 
                    } 
                } 
            } 
        }
    </script>
    <link rel="icon" href="https://www.russellbedford.com.co/favicon.ico" type="image/x-icon" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <!-- Importar Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/supabaseClient.js"></script>
</head>
<body class="bg-corporate-bg min-h-screen flex items-center justify-center p-6">

    <div class="bg-white rounded-3xl shadow-xl w-full max-w-md overflow-hidden flex flex-col items-center p-10 relative border border-gray-100">
        <a href="../index.html" class="absolute top-6 left-6 text-gray-400 hover:text-corporate-blue transition">
            <i class="fa-solid fa-arrow-left"></i>
        </a>

        <img src="https://raw.githubusercontent.com/AutomatizaRussell/Resourse_GestionHumana/main/Logo_RB2021.png" alt="Logo" class="h-16 mb-8 mt-4">
        
        <h2 class="text-2xl font-bold text-gray-800 mb-2">Portal de Usuarios</h2>
        <p class="text-gray-500 text-sm text-center mb-8">Ingresa tus credenciales para continuar.</p>

        <form id="loginForm" class="w-full space-y-5">
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Correo Electrónico</label>
                <div class="relative">
                    <i class="fa-solid fa-envelope absolute left-4 top-3.5 text-gray-400"></i>
                    <input type="email" id="correo_input" placeholder="Admin@rbcol.co" required 
                        class="w-full pl-11 pr-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-corporate-blue outline-none transition bg-gray-50 focus:bg-white text-gray-700">
                </div>
            </div>

            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Contraseña / Clave</label>
                <div class="relative">
                    <i class="fa-solid fa-lock absolute left-4 top-3.5 text-gray-400"></i>
                    <input type="password" id="clave_input" placeholder="•••••" required 
                        class="w-full pl-11 pr-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-corporate-blue outline-none transition bg-gray-50 focus:bg-white text-gray-700">
                </div>
            </div>

            <button type="submit" id="submitBtn" class="w-full bg-corporate-blue hover:bg-blue-800 text-white font-bold py-3 rounded-xl transition shadow-md mt-2 flex justify-center items-center gap-2">
                Iniciar Sesión
            </button>
        </form>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('correo_input').value.trim();
            const password = document.getElementById('clave_input').value.trim();
            const btn = document.getElementById('submitBtn');
            const originalText = btn.innerHTML;
            
            btn.disabled = true;
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Verificando...';

            try {
                // 1. Iniciar sesión segura con Supabase Auth
                const { data: authData, error: authError } = await window.supabaseClient.auth.signInWithPassword({
                    email: email,
                    password: password
                });

                if (authError) {
                    alert('Acceso denegado: Correo o contraseña incorrectos.');
                    btn.disabled = false;
                    btn.innerHTML = originalText;
                    return;
                }

               // 2. Buscar datos especificando el esquema correcto con .schema()
                const { data: empleado, error: empError } = await window.supabaseClient
                    .schema('rbgct')
                    .from('empleados')
                    .select('*')
                    .eq('correo_corporativo', email)
                    .single();

                if (empError) {
                    console.error("Error detallado de Supabase:", empError);
                    alert('Error al buscar empleado: ' + empError.message);
                    btn.disabled = false;
                    btn.innerHTML = originalText;
                    return;
                }

                if (empleado) {
                    localStorage.setItem('empleado_id', empleado.id);
                    localStorage.setItem('empleado_nombre', empleado.nombre_completo);
                    localStorage.setItem('empleado_rol', empleado.rol);
                    localStorage.setItem('empleado_documento', empleado.documento);
                    
                    window.location.href = 'dashboard.html';
                } else {
                    alert('Usuario autenticado pero no encontrado en el directorio de empleados.');
                    btn.disabled = false;
                    btn.innerHTML = originalText;
                }

            } catch (err) {
                console.error('Error:', err);
                alert('Ocurrió un error inesperado al conectar con el servidor.');
                btn.disabled = false;
                btn.innerHTML = originalText;
            }
        });
    </script>
</body>
</html>
