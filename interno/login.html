<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Russell Bedford</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        corporate: {
                            blue: '#001871',
                            light: '#002bc2',
                            bg: '#F8F9FA'
                        }
                    }
                }
            }
        }
    </script>
    <link rel="icon" href="https://www.russellbedford.com.co/favicon.ico" type="image/x-icon">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-corporate-bg min-h-screen flex flex-col items-center justify-center relative overflow-hidden">

    <div class="absolute top-0 left-0 w-full h-80 bg-gradient-to-b from-blue-100 to-transparent z-0 opacity-60"></div>

    <div class="relative z-10 w-full max-w-md px-6 py-12 bg-white rounded-3xl shadow-xl border border-gray-100 text-center">
        <img src="https://raw.githubusercontent.com/AutomatizaRussell/Resourse_GestionHumana/main/Logo_RB2021.png" alt="Russell Bedford" class="h-20 w-auto mx-auto mb-6 drop-shadow-sm object-contain">
        <h1 class="text-3xl font-extrabold text-corporate-blue tracking-tight mb-2">Acceso de Empleados</h1>
        <p class="text-gray-500 text-sm mb-8">Ingresa con tu correo y contraseña corporativa.</p>

        <form id="login-form" class="space-y-6">
            <div>
                <label for="email" class="sr-only">Correo Electrónico</label>
                <input type="email" id="email" placeholder="Correo Corporativo" required
                    class="block w-full px-5 py-3 border border-gray-300 rounded-xl shadow-sm placeholder-gray-400 focus:outline-none focus:ring-corporate-blue focus:border-corporate-blue text-sm">
            </div>
            <div>
                <label for="password" class="sr-only">Contraseña</label>
                <input type="password" id="password" placeholder="Contraseña" required
                    class="block w-full px-5 py-3 border border-gray-300 rounded-xl shadow-sm placeholder-gray-400 focus:outline-none focus:ring-corporate-blue focus:border-corporate-blue text-sm">
            </div>
            <div>
                <button type="submit" id="btn-login"
                    class="w-full flex justify-center py-3 px-4 border border-transparent rounded-xl shadow-sm text-sm font-semibold text-white bg-corporate-blue hover:bg-corporate-light focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-corporate-blue transition-all">
                    Iniciar Sesión
                </button>
            </div>
        </form>

        <p class="mt-8 text-xs text-gray-400">¿Olvidaste tu contraseña? Contacta a Recursos Humanos.</p>
    </div>
    
    <script src="../js/supabaseClient.js"></script>
    <script src="empleado.js"></script> 
</body>
</html>
