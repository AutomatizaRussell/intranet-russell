<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RRHH Dashboard | Russell Bedford</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const rolActual = localStorage.getItem('empleado_rol');
        if (rolActual !== 'admin') window.location.href = '../index.html';
    </script>
    <script>
        tailwind.config = { theme: { extend: { colors: { corporate: { blue: '#001871', light: '#002bc2', bg: '#F8F9FA' } } } } }
    </script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="icon" href="https://raw.githubusercontent.com/AutomatizaRussell/Resourse_GestionHumana/main/Logo_RB2021.png?v=1" type="image/png"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
        body { font-family: 'Inter', sans-serif; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #888; border-radius: 4px; }
    </style>
</head>
<body class="bg-corporate-bg h-screen flex overflow-hidden">

    <aside class="w-64 bg-white border-r border-gray-200 flex flex-col shadow-sm hidden md:flex z-10">
        <div class="h-24 flex items-center justify-center border-b border-gray-100 mt-2 pb-4">
            <img src="https://raw.githubusercontent.com/AutomatizaRussell/Resourse_GestionHumana/main/Logo_RB2021.png" alt="Russell Bedford" class="h-16 object-contain">
        </div>
        
        <div class="px-6 py-6 flex-1">
            <p class="text-xs font-bold text-gray-400 uppercase tracking-wider mb-4">Gestión de Vacantes y Solicitudes</p>
            <nav class="space-y-2">
                <button onclick="switchTab('postulaciones')" id="btn-postulaciones" class="w-full flex items-center gap-3 px-4 py-3 bg-corporate-blue text-white rounded-xl transition-all font-medium shadow-md">
                    <i class="fa-solid fa-inbox w-5"></i> Postulaciones
                </button>
                
                <button onclick="switchTab('gestion-vacantes')" id="btn-gestion-vacantes" class="w-full flex items-center gap-3 px-4 py-3 text-gray-600 hover:bg-blue-50 hover:text-corporate-blue rounded-xl transition-all font-medium">
                    <i class="fa-solid fa-briefcase w-5"></i> Vacantes
                </button>
            </nav>
        </div>

        <div class="p-6 border-t border-gray-100 bg-gray-50">
            <button id="btn-logout" class="w-full flex items-center justify-center gap-2 px-4 py-2 text-gray-500 hover:text-red-600 transition-colors font-medium text-sm">
                <i class="fa-solid fa-arrow-right-from-bracket"></i> Cerrar Sesión
            </button>
        </div>
    </aside>

    <main class="flex-1 flex flex-col overflow-hidden relative">
        <div class="flex-1 overflow-auto p-8">
            
            <div id="tab-postulaciones" class="tab-content active">
                <h2 class="text-3xl font-bold text-[#001871] tracking-tight mb-8">Postulaciones Recibidas</h2>
                <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
                    <table class="w-full text-left border-collapse" id="tabla-postulaciones">
                        <thead>
                            <tr class="bg-gray-50 text-gray-600 text-sm border-b border-gray-100">
                                <th class="py-4 px-6 font-semibold">Candidato</th>
                                <th class="py-4 px-6 font-semibold">Contacto</th>
                                <th class="py-4 px-6 font-semibold">Vacante Aplicada</th>
                                <th class="py-4 px-6 font-semibold text-right">Hoja de Vida</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr><td colspan="4" class="text-center py-6 text-gray-500"><i class="fa-solid fa-spinner fa-spin mr-2"></i> Cargando postulaciones...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <div id="tab-gestion-vacantes" class="tab-content">
                <div class="flex justify-between items-center mb-8">
                    <h2 class="text-3xl font-bold text-corporate-blue tracking-tight">Gestión de Vacantes</h2>
                    <button onclick="abrirModalVacante()" class="bg-orange-500 hover:bg-orange-600 text-white font-bold py-2.5 px-5 rounded-xl shadow-md transition-colors flex items-center gap-2">
                        <i class="fa-solid fa-plus"></i> Nueva Vacante
                    </button>
                </div>
                <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
                    <table class="w-full text-left border-collapse" id="tabla-gestion-vacantes">
                        <thead>
                            <tr class="bg-gray-50 text-gray-600 text-sm border-b border-gray-100">
                                <th class="py-4 px-6 font-semibold">Estado</th>
                                <th class="py-4 px-6 font-semibold">Título de la Vacante</th>
                                <th class="py-4 px-6 font-semibold">Área</th>
                                <th class="py-4 px-6 font-semibold text-right">Acciones</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr><td colspan="4" class="text-center py-6 text-gray-500"><i class="fa-solid fa-spinner fa-spin mr-2"></i> Cargando vacantes...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>

        </div>
    </main>

    <div id="modalVacante" class="hidden fixed inset-0 z-50 bg-black/60 backdrop-blur-sm flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-lg overflow-hidden transform transition-all">
            <div class="bg-corporate-blue p-5 text-white flex justify-between items-center">
                <h3 class="font-bold text-lg" id="modalVacanteTitle">Nueva Vacante</h3>
                <button onclick="cerrarModalVacante()" class="text-white/70 hover:text-white transition-colors">
                    <i class="fa-solid fa-xmark text-xl"></i>
                </button>
            </div>
            <form id="formVacante" class="p-6 space-y-4" onsubmit="guardarVacante(event)">
                <input type="hidden" id="vacanteId">
                
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Título de la Oferta <span class="text-red-500">*</span></label>
                    <input type="text" id="vacanteTitulo" required class="w-full px-4 py-2.5 border border-gray-300 rounded-xl focus:ring-2 focus:ring-corporate-blue outline-none text-sm bg-gray-50 focus:bg-white transition-colors">
                </div>
                
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-1">Área Solicitante <span class="text-red-500">*</span></label>
                        <select id="vacanteArea" required class="w-full px-4 py-2.5 border border-gray-300 rounded-xl focus:ring-2 focus:ring-corporate-blue outline-none text-sm bg-gray-50 focus:bg-white transition-colors">
                            <option value="Auditoría">Auditoría</option>
                            <option value="Legal">Legal</option>
                            <option value="Administrativo">Administrativo</option>
                            <option value="Contabilidad">Contabilidad</option>
                            <option value="Impuestos">Impuestos</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-1">Estado de la Vacante</label>
                        <select id="vacanteEstado" class="w-full px-4 py-2.5 border border-gray-300 rounded-xl focus:ring-2 focus:ring-corporate-blue outline-none text-sm bg-gray-50 focus:bg-white transition-colors">
                            <option value="abierta">Abierta (Visible al público)</option>
                            <option value="cerrada">Cerrada (Oculta)</option>
                        </select>
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Descripción y Requisitos <span class="text-red-500">*</span></label>
                    <textarea id="vacanteDescripcion" rows="4" required class="w-full px-4 py-2.5 border border-gray-300 rounded-xl focus:ring-2 focus:ring-corporate-blue outline-none text-sm bg-gray-50 focus:bg-white transition-colors resize-none"></textarea>
                </div>

                <div class="pt-2 flex justify-end gap-3">
                    <button type="button" onclick="cerrarModalVacante()" class="px-5 py-2.5 rounded-xl border border-gray-300 text-gray-700 font-medium hover:bg-gray-50 transition-colors">Cancelar</button>
                    <button type="submit" id="btnGuardarVacante" class="px-6 py-2.5 rounded-xl bg-corporate-blue text-white font-bold hover:bg-blue-900 shadow-md transition-colors flex items-center gap-2">
                        <i class="fa-solid fa-save"></i> Guardar Vacante
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script>
        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('nav button').forEach(el => {
                el.classList.remove('bg-corporate-blue', 'text-white', 'shadow-md');
                el.classList.add('text-gray-600', 'hover:bg-blue-50');
            });
            document.getElementById('tab-' + tabId).classList.add('active');
            const btn = document.getElementById('btn-' + tabId);
            if(btn) {
                btn.classList.remove('text-gray-600', 'hover:bg-blue-50');
                btn.classList.add('bg-corporate-blue', 'text-white', 'shadow-md');
            }
        }
    </script>
    
    <script src="../js/supabaseClient.js?v=28"></script>
    <script src="rrhh.js?v=28"></script>
</body>
</html>
